name: Notion同期 / Sync from Notion

on:
  # 毎時0分に自動実行
  schedule:
    - cron: "0 * * * *"

  # GitHubのActionsタブから手動実行可能
  workflow_dispatch:

  # template.htmlを変更したときも再ビルド
  push:
    paths:
      - "template.html"
      - "generate.js"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Notionからデータ取得 → index.html生成
        run: node generate.js
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}

      - name: 変更があればコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "変更なし — スキップ"
          else
            git commit -m "sync: Notion → index.html ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
