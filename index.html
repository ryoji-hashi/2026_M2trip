<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:       #080F1E;
  --s1:       #0F1B2E;
  --s2:       #162030;
  --s3:       #1C2840;
  --border:   rgba(255,255,255,.08);
  --brd-hi:   rgba(255,255,255,.15);
  --text:     #E2EAF5;
  --text2:    #8A9DB5;
  --text3:    #4E6070;
  --gold:     #F0A020;
  --gold-bg:  rgba(240,160,32,.12);
  --gold-brd: rgba(240,160,32,.38);
  --accent:   #3B82F6;
  --accent-hover: #2563EB;
  /* groups */
  --g-all-bg:#1E1550; --g-all-tx:#9D8DF8; --g-all-bd:rgba(139,92,246,.35);
  /* status */
  --ok:  #4ADE80;
  --ng:  #8A9DB5;
  /* radius */
  --r:8px; --r2:12px;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,'Hiragino Kaku Gothic Pro','Hiragino Sans','Noto Sans JP',sans-serif;
  min-height:100vh;
  padding-bottom:3rem;
  -webkit-font-smoothing:antialiased;
}

/* ── hero banner ── */
.hero{
  position:relative;
  height:200px;
  background:var(--s1) url('assets/header.jpg') center 30%/cover no-repeat;
}
.hero::after{
  content:"";
  position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(8,15,30,0) 45%, rgba(8,15,30,.88) 100%);
}
.hero-title{
  position:absolute; left:16px; right:16px; bottom:14px; z-index:1;
  font-size:21px; font-weight:700; color:#fff; line-height:1.3;
  text-shadow:0 2px 10px rgba(0,0,0,.6);
}

/* ── header ── */
.hdr{
  background:var(--s1);
  border-bottom:1px solid var(--border);
  padding:14px 16px 10px;
  position:sticky; top:0; z-index:20;
}
.tz-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}

/* ── floating edit button ── */
.fab{
  position:fixed; right:18px; bottom:18px; z-index:30;
  display:flex; align-items:center; justify-content:center; gap:6px;
  height:48px; min-width:48px; padding:0 16px;
  border-radius:24px;
  border:1px solid var(--accent);
  background:rgba(59,130,246,.32);
  -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
  color:#fff; font-size:13px; font-weight:700; font-family:inherit;
  white-space:nowrap; cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,.4);
  transition:background .15s, padding .15s, min-width .15s;
}
.fab:hover{background:rgba(59,130,246,.55)}
.fab.collapsed{min-width:48px; width:48px; padding:0; font-size:22px; line-height:1}

.tz-btn{
  display:flex;align-items:center;gap:5px;
  padding:7px 12px;border-radius:var(--r);
  border:1.5px solid var(--border);
  background:transparent;color:var(--text2);
  font-size:13px;font-family:inherit;cursor:pointer;
  transition:all .15s;
}
.tz-btn.on{
  border-color:var(--gold-brd);
  background:var(--gold-bg);
  color:var(--gold);
}
.tz-btn:hover:not(.on){border-color:var(--brd-hi);color:var(--text)}
.tz-abbr{font-weight:600}
/* 差分テキストはボタン内に常に存在しスペースを確保、active時のみ表示 */
.tz-diff{font-size:10px;font-weight:400;opacity:0;transition:opacity .15s}
.tz-btn.on .tz-diff{opacity:.8}

/* ── main ── */
.main{padding:14px 14px 0;max-width:640px;margin:0 auto}

/* member / group filter */
.filter-label{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:5px}
.grp-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.grp-btn{
  padding:5px 12px;border-radius:20px;
  border:1px solid var(--border);
  background:transparent;color:var(--text3);
  font-size:12px;font-family:inherit;cursor:pointer;
  transition:all .12s;
}
.grp-btn.on{border-color:var(--brd-hi);background:var(--s3);color:var(--text)}
.grp-btn:hover:not(.on){border-color:var(--brd-hi)}

/* view switch (list / calendar) */
.view-row{display:flex;gap:6px;margin-bottom:14px}

/* calendar view */
.cal-month{margin-bottom:20px}
.cal-month-head{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-wd{font-size:10px;color:var(--text3);text-align:center;padding-bottom:2px}
.cal-cell{
  background:var(--s2);border:1px solid var(--border);border-radius:var(--r);
  min-height:56px;padding:3px;display:flex;flex-direction:column;gap:2px;
}
.cal-cell.empty{background:transparent;border-color:transparent}
.cal-cell-noev{opacity:.5}
.cal-date{font-size:10px;font-weight:600;color:var(--text2)}
.cal-ev{
  font-size:9px;line-height:1.3;padding:1px 3px;border-radius:4px;
  background:var(--s3);color:var(--text2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.cal-ev.g-all{background:var(--g-all-bg);color:var(--g-all-tx)}

/* date section */
.dt-sec{margin-bottom:18px}
.dt-head{
  font-size:13px;font-weight:600;color:var(--text2);
  padding-bottom:8px;margin-bottom:10px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:7px;
}
.dt-tz{font-size:11px;color:var(--text3);font-weight:400}

/* event row */
.ev{display:grid;grid-template-columns:56px 1px 1fr;gap:0 10px;margin-bottom:6px;align-items:stretch}
.ev-time{text-align:right;padding-top:10px;min-height:40px}
.ev-t{font-size:15px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;line-height:1.2}
.ev-t-end{font-size:11px;font-weight:600;color:var(--text2);font-variant-numeric:tabular-nums;margin-top:1px}
.ev-line{background:var(--brd-hi);border-radius:1px;margin:6px 0}
.ev-card{
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r2);padding:9px 12px;
  transition:border-color .12s;
}
.ev-card:hover{border-color:var(--brd-hi)}

/* badges */
.badges{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:5px}
.badge{font-size:11px;padding:1px 8px;border-radius:20px;white-space:nowrap}
.g-all {background:var(--g-all-bg);color:var(--g-all-tx);border:1px solid var(--g-all-bd)}
.g-team{background:var(--s3);color:var(--text2);border:1px solid var(--brd-hi)}
.g-cat {background:transparent;color:var(--text2);border:1px solid var(--border)}
.badge-count{font-size:11px;color:var(--text3)}
.st-ok {font-size:11px;color:var(--ok)}
.st-ng {font-size:11px;color:var(--ng)}

.ev-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.45;margin-bottom:3px}
.ev-loc{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px}
.ev-loc::before{content:"📍";font-size:10px}

/* split banner */
.split-banner{
  background:var(--s1);border:1px dashed var(--brd-hi);
  border-radius:var(--r2);padding:10px 14px;margin-bottom:8px;
  font-size:12px;color:var(--text2);text-align:center;
  display:flex;align-items:center;justify-content:center;gap:8px;
}

/* stats bar */
.stats{
  display:grid;grid-template-columns:repeat(2,1fr);gap:8px;
  margin-top:18px;
}
.stat{
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r2);padding:10px 12px;text-align:center;
}
.stat-n{font-size:20px;font-weight:700;color:var(--text);line-height:1}
.stat-l{font-size:11px;color:var(--text3);margin-top:3px}

/* footer */
footer{
  max-width:640px;margin:0 auto;
  padding:20px 16px;text-align:center;
  font-size:12px;color:var(--text3);line-height:1.7;
}
footer a{color:var(--gold);text-decoration:none}
footer a:hover{text-decoration:underline}

/* empty */
.empty{text-align:center;padding:4rem 0;color:var(--text3);font-size:14px}

/* loading spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{
  width:18px;height:18px;border:2px solid var(--brd-hi);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin .7s linear infinite;display:inline-block;
}

/* mobile tweak */
@media(max-width:400px){
  .tz-btn{padding:6px 8px;font-size:12px}
  .hero{height:150px}
  .hero-title{font-size:17px}
  .fab{right:14px; bottom:14px; height:44px; min-width:44px}
  .fab.collapsed{width:44px; min-width:44px; font-size:20px}
  .cal-cell{min-height:44px;padding:2px}
  .cal-ev{font-size:8px}
}

/* print */
@media print{
  .hdr{position:static}
  .hero{display:none}
  body{background:#fff;color:#000}
}
</style>

const ALL_MEMBERS = [
  "おはる",
  "ごんちゃん",
  "だいちゃん",
  "せいや",
  "なーちゃん",
  "ほっぴー",
  "もとや",

/* ── 定数 ── */
/* 旅程: 大阪 → (上海経由) → イタリア・(スペイン)・フランス・チェコ・
   オーストリア・ドイツ → (ベトナム経由) → 大阪。9月は欧州はサマータイム中なので
   CEST(UTC+2)のみで足りる（CETは使わない）。 */
const TZS = [
  { id:"JST",  flag:"🇯🇵", abbr:"JST",  offset:9 },
  { id:"CST",  flag:"🇨🇳", abbr:"CST",  offset:8 },
  { id:"CEST", flag:"🇪🇺", abbr:"CEST", offset:2 },
  { id:"ICT",  flag:"🇻🇳", abbr:"ICT",  offset:7 },
];
const WDAYS = ["日","月","火","水","木","金","土"];
const COUNT_BADGE_THRESHOLD = 5; /* この人数以上は名前列挙ではなく人数表示に切替える */

/* ── 状態 ── */
let selTZ      = TZS[0];  /* default: JST */
let filterMode = null;    /* null = 全予定表示, "member" | "group" | "category" のいずれかひとつ */
let selMembers    = new Set();  /* filterMode==="member"   のとき選択中のメンバー名（複数可） */
let selGroups     = new Set();  /* filterMode==="group"    のとき選択中のグループ名（複数可） */
let selCategories = new Set();  /* filterMode==="category" のとき選択中のカテゴリ（複数可） */
let view       = "list";  /* "list" | "calendar" */

/* ── ユーティリティ ── */
function p2(n){ return String(n).padStart(2,"0") }

function toConv(isoLocal, fromOff, toOff){
  const [date, time="00:00"] = isoLocal.split("T");
  const [y,mo,d] = date.split("-").map(Number);
  const [h,mi]   = time.split(":").map(Number);
  const utcMs = Date.UTC(y,mo-1,d, h-fromOff, mi);
  const tMs   = utcMs + toOff*3_600_000;
  const D = new Date(tMs);
  return {
    dateStr:`${D.getUTCFullYear()}-${p2(D.getUTCMonth()+1)}-${p2(D.getUTCDate())}`,
    timeStr:`${p2(D.getUTCHours())}:${p2(D.getUTCMinutes())}`,
    ms:tMs,
  };
}

function fmtDate(ds){
  const [y,mo,d]=ds.split("-").map(Number);
  const D=new Date(Date.UTC(y,mo-1,d));
  return `${mo}/${d}（${WDAYS[D.getUTCDay()]}）`;
}

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") }

/* Notionの「グループ」選択値から末尾の "(N)" 人数表記を取り除く。例: "大多数(6)" → "大多数" */
function normalizeTag(t){ return String(t).replace(/[（(]\d+[）)]\s*$/, "").trim(); }

/* グループ絞り込みボタンの表示順。ここに無い新しいグループ名は末尾に追加される */
const GROUP_ORDER = ["全員", "大多数", "山登り", "ドイツ組"];

/* グループ間の包含関係: あるグループのメンバーが別グループに完全に含まれる場合、
   そのグループで絞り込んだときに含む側のタグが付いた予定も一緒に表示する。
   例: ドイツ組(だいちゃん・そうし) ⊂ 山登り(だいちゃん・そうし・りょうじ) */
const GROUP_INCLUDES = {
  "ドイツ組": ["山登り"],
};

/* 全イベントの groupTags から「グループ名」だけを抽出（個人名タグは参加メンバー扱いなので除外） */
const GROUP_TAGS = [...new Set(
  EVENTS.flatMap(ev => (ev.groupTags || []).map(normalizeTag))
)].filter(tag => tag && !ALL_MEMBERS.includes(tag))
 .sort((a, b) => {
   const ia = GROUP_ORDER.indexOf(a), ib = GROUP_ORDER.indexOf(b);
   if (ia === -1 && ib === -1) return a.localeCompare(b, "ja");
   if (ia === -1) return 1;
   if (ib === -1) return -1;
   return ia - ib;
 });

/* カテゴリ絞り込みボタンの表示順。ここに無い新しいカテゴリは末尾に追加される */
const CATEGORY_ORDER = ["✈️ 移動", "🚆 鉄道", "🚌 バス", "🏨 宿泊", "🗺️ 観光", "🍽️ 食事", "📍 集合・解散", "🎉 アクティビティ"];

/* 全イベントの category 値を抽出（絵文字込みの生の値をそのままタグとして使う） */
const CATEGORY_TAGS = [...new Set(EVENTS.map(ev => ev.category).filter(Boolean))]
 .sort((a, b) => {
   const ia = CATEGORY_ORDER.indexOf(a), ib = CATEGORY_ORDER.indexOf(b);
   if (ia === -1 && ib === -1) return a.localeCompare(b, "ja");
   if (ia === -1) return 1;
   if (ib === -1) return -1;
   return ia - ib;
 });

/* メンバー構成からバッジの見た目を決める */
function badgeInfo(ev){
  const members = ev.members || [];
  const tags = (ev.groupTags || []).map(normalizeTag).filter(Boolean);
  if (tags.length) {
    const isAll = tags.includes("全員") || members.length === ALL_MEMBERS.length;
    return { cls: isAll ? "g-all" : "g-team", label: esc(tags.join("＋")) };
  }
  if (members.length === ALL_MEMBERS.length) return { cls:"g-all", label:"🌐 全員" };
  if (members.length >= COUNT_BADGE_THRESHOLD) return { cls:"g-team", label:`👥 ${members.length}名` };
  return { cls:"g-team", label: esc(members.join("・")) || "—" };
}

/* ─────────── RENDER: リスト ─────────── */
function renderListHtml(byDate){
  let html = "";
  for(const [dateKey, evs] of byDate){
    html += `<div class="dt-sec">
      <div class="dt-head">
        📅 ${fmtDate(dateKey)}
        <span class="dt-tz">${selTZ.flag} ${selTZ.abbr}基準</span>
      </div>`;

    for(const ev of evs){
      const badge = badgeInfo(ev);

      /* split/rejoin banner */
      let banner = "";
      if(ev.isSplit)  banner = `<div class="split-banner">↙↘ ここでグループが分岐します</div>`;
      if(ev.isRejoin) banner = `<div class="split-banner">↗↖ 全員が再合流します！</div>`;

      html += banner + `
      <div class="ev">
        <div class="ev-time">
          <div class="ev-t">${ev.conv.timeStr}</div>
          ${ev.convEnd ? `<div class="ev-t-end">〜${ev.convEnd.timeStr}</div>` : ""}
        </div>
        <div class="ev-line"></div>
        <div class="ev-card">
          <div class="badges">
            ${ev.category ? `<span class="badge g-cat">${esc(ev.category)}</span>` : ""}
            <span class="badge ${badge.cls}">${badge.label}</span>
            <span class="badge-count">${(ev.members||[]).length}名</span>
            <span class="${ev.status==="ok"?"st-ok":"st-ng"}">${ev.status==="ok"?"✅ 確定":"📝 計画中"}</span>
          </div>
          <div class="ev-name">${esc(ev.name)}</div>
          ${ev.loc ? `<div class="ev-loc">${esc(ev.loc)}</div>` : ""}
        </div>
      </div>`;
    }

    html += `</div>`;
  }
  return html;
}

/* ─────────── RENDER: カレンダー ─────────── */
function renderCalendarHtml(byDate){
  /* 出現する年月ごとにグリッドを作る */
  const months = [...new Set([...byDate.keys()].map(k=>k.slice(0,7)))].sort();

  let html = "";
  for(const ym of months){
    const [y,mo] = ym.split("-").map(Number);
    const firstWd     = new Date(Date.UTC(y,mo-1,1)).getUTCDay();
    const daysInMonth = new Date(Date.UTC(y,mo,0)).getUTCDate();

    html += `<div class="cal-month">
      <div class="cal-month-head">${y}年${mo}月</div>
      <div class="cal-grid">`;
    html += WDAYS.map(w=>`<div class="cal-wd">${w}</div>`).join("");
    for(let i=0;i<firstWd;i++) html += `<div class="cal-cell empty"></div>`;
    for(let d=1; d<=daysInMonth; d++){
      const dateKey = `${y}-${p2(mo)}-${p2(d)}`;
      const evs = byDate.get(dateKey) || [];
      html += `<div class="cal-cell${evs.length?"":" cal-cell-noev"}">
        <div class="cal-date">${d}</div>
        ${evs.map(ev=>{
          const badge = badgeInfo(ev);
          const timeLabel = ev.convEnd ? `${ev.conv.timeStr}〜${ev.convEnd.timeStr}` : ev.conv.timeStr;
          return `<div class="cal-ev ${badge.cls}" title="${esc(ev.name)}">${timeLabel} ${esc(ev.name)}</div>`;
        }).join("")}
      </div>`;
    }
    html += `</div></div>`;
  }
  return html;
}

/* ─────────── RENDER ─────────── */
function render(){
  /* filter + process */
  const filtered = EVENTS
    .map(ev => ({
      ...ev,
      conv:    toConv(ev.dt, ev.srcTZ, selTZ.offset),
      convEnd: ev.dtEnd ? toConv(ev.dtEnd, ev.srcTZ, selTZ.offset) : null,
    }))
    .filter(ev => {
      if (!filterMode) return true;
      if (filterMode === "category") return selCategories.has(ev.category); /* カテゴリ絞り込みは「全員参加は常に表示」の対象外 */
      if ((ev.members||[]).length === ALL_MEMBERS.length) return true; /* 全員参加の予定は絞り込み中でも常に表示 */
      if (filterMode === "member") return (ev.members||[]).some(m => selMembers.has(m));
      const matchGroups = new Set(selGroups);
      selGroups.forEach(g => (GROUP_INCLUDES[g]||[]).forEach(t => matchGroups.add(t)));
      return (ev.groupTags||[]).map(normalizeTag).some(t => matchGroups.has(t));
    })
    .sort((a,b)=>a.conv.ms-b.conv.ms);

  /* group by date */
  const byDate = new Map();
  filtered.forEach(ev=>{
    const k=ev.conv.dateStr;
    if(!byDate.has(k)) byDate.set(k,[]);
    byDate.get(k).push(ev);
  });

  /* stats */
  const nAll  = filtered.filter(e=>(e.members||[]).length===ALL_MEMBERS.length).length;
  const nSub  = filtered.length - nAll;
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="stat-n">${nAll}</div><div class="stat-l">全員予定</div></div>
    <div class="stat"><div class="stat-n">${nSub}</div><div class="stat-l">サブグループ予定</div></div>
  `;

  const timelineEl = document.getElementById("timeline");
  const calendarEl = document.getElementById("calendar");
  timelineEl.style.display = view==="list" ? "" : "none";
  calendarEl.style.display = view==="calendar" ? "" : "none";

  if(filtered.length===0){
    const emptyHtml = `<div class="empty">予定がありません</div>`;
    timelineEl.innerHTML = emptyHtml;
    calendarEl.innerHTML = emptyHtml;
    return;
  }

  if(view==="list") timelineEl.innerHTML = renderListHtml(byDate);
  else              calendarEl.innerHTML = renderCalendarHtml(byDate);
}

/* ─────────── INIT ─────────── */

/* 編集用フローティングボタン: 最初は「＋」だけの丸ボタン、タップで「✏️ Notionで編集」に
   展開し、もう一度タップするとNotionのページへ飛ぶ。展開中に外側をタップすると閉じる。 */
const fab = document.getElementById("fab");
let fabExpanded = false;
function setFabExpanded(expanded){
  fabExpanded = expanded;
  fab.classList.toggle("collapsed", !expanded);
  fab.textContent = expanded ? "✏️ Notionで予定を編集" : "＋";
}
setFabExpanded(false);
fab.addEventListener("click", ()=>{
  if (!fabExpanded) { setFabExpanded(true); return; }
  window.open("https://app.notion.com/p/38eea09ee62c8166ad9af49457cc809f", "_blank", "noopener");
});
document.addEventListener("click", e=>{
  if (fabExpanded && !fab.contains(e.target)) setFabExpanded(false);
});

/* 最終更新 */
if(UPDATED_AT){
  const d = new Date(UPDATED_AT);
  const jst = new Date(d.getTime()+9*3600000);
  document.getElementById("updated-at").textContent=
    `最終更新: ${jst.getUTCFullYear()}/${p2(jst.getUTCMonth()+1)}/${p2(jst.getUTCDate())} ${p2(jst.getUTCHours())}:${p2(jst.getUTCMinutes())} JST`;
}

/* TZ buttons */
const tzRow = document.getElementById("tz-row");
TZS.forEach(tz=>{
  const btn = document.createElement("button");
  const diff = tz.offset - 9;
  const diffLabel = diff===0 ? "" : (diff>0?`+${diff}h`:`${diff}h`);
  btn.className = "tz-btn" + (tz.id===selTZ.id?" on":"");
  btn.setAttribute("aria-pressed", tz.id===selTZ.id);
  /* 差分テキストを常にボタン内に含めることでスペースを確保し、opacity で表示/非表示を切り替える */
  btn.innerHTML = `${tz.flag} <span class="tz-abbr">${tz.abbr}</span>${diffLabel?`<span class="tz-diff">${diffLabel}</span>`:""}`;
  btn.addEventListener("click",()=>{
    selTZ = tz;
    document.querySelectorAll(".tz-btn").forEach(b=>{
      b.classList.toggle("on", b===btn);
      b.setAttribute("aria-pressed", b===btn);
    });
    render();
  });
  tzRow.appendChild(btn);
});

/* フィルターボタンの選択状態を filterMode/selMembers/selGroups/selCategories に合わせて再計算する (メンバー行・グループ行・カテゴリ行共通) */
function syncFilterButtons(){
  document.querySelectorAll(".filter-btn").forEach(b=>{
    const ftype = b.dataset.ftype;
    let active;
    if (ftype === "")              active = (filterMode === null);
    else if (ftype === "member")   active = (filterMode === "member"   && selMembers.has(b.dataset.fvalue));
    else if (ftype === "group")    active = (filterMode === "group"    && selGroups.has(b.dataset.fvalue));
    else                            active = (filterMode === "category" && selCategories.has(b.dataset.fvalue));
    b.classList.toggle("on", active);
  });
}

/* 3つの選択Setのうち、指定したもの以外をクリアする（モード切替時の共通処理） */
function clearOtherSelections(keep){
  if (keep !== "member")   selMembers.clear();
  if (keep !== "group")    selGroups.clear();
  if (keep !== "category") selCategories.clear();
}

/* メンバー名タップ: 別モードから来た場合はそのメンバー単独選択でメンバーモードへ切替、
   同じモード内ならそのメンバーをトグル（複数選択可）。選択が0件になったら「すべて」に戻る。 */
function toggleMember(name){
  if (filterMode !== "member") {
    filterMode = "member";
    clearOtherSelections("member");
    selMembers.add(name);
  } else {
    if (selMembers.has(name)) selMembers.delete(name); else selMembers.add(name);
    if (selMembers.size === 0) filterMode = null;
  }
}

/* グループ名タップ: toggleMember と対称の挙動 */
function toggleGroup(tag){
  if (filterMode !== "group") {
    filterMode = "group";
    clearOtherSelections("group");
    selGroups.add(tag);
  } else {
    if (selGroups.has(tag)) selGroups.delete(tag); else selGroups.add(tag);
    if (selGroups.size === 0) filterMode = null;
  }
}

/* カテゴリタップ: toggleMember/toggleGroup と対称の挙動 */
function toggleCategory(cat){
  if (filterMode !== "category") {
    filterMode = "category";
    clearOtherSelections("category");
    selCategories.add(cat);
  } else {
    if (selCategories.has(cat)) selCategories.delete(cat); else selCategories.add(cat);
    if (selCategories.size === 0) filterMode = null;
  }
}

/* メンバーフィルター (ALL_MEMBERS から動的生成、固定グループ定義を持たない) */
const grpRow = document.getElementById("grp-row");
const btnAll = document.createElement("button");
btnAll.className = "grp-btn filter-btn";
btnAll.dataset.ftype = "";
btnAll.dataset.fvalue = "";
btnAll.textContent = "すべて";
btnAll.addEventListener("click",()=>{
  filterMode = null;
  clearOtherSelections(null);
  syncFilterButtons();
  render();
});
grpRow.appendChild(btnAll);

ALL_MEMBERS.forEach(name=>{
  const btn = document.createElement("button");
  btn.className = "grp-btn filter-btn";
  btn.dataset.ftype = "member";
  btn.dataset.fvalue = name;
  btn.textContent = name;
  btn.addEventListener("click",()=>{
    toggleMember(name);
    syncFilterButtons();
    render();
  });
  grpRow.appendChild(btn);
});

/* グループフィルター (Notionの「グループ」プロパティから動的生成。データがなければ行ごと非表示) */
const groupRow = document.getElementById("group-row");
if (GROUP_TAGS.length) {
  document.getElementById("group-label").style.display = "";
  GROUP_TAGS.forEach(tag=>{
    const btn = document.createElement("button");
    btn.className = "grp-btn filter-btn";
    btn.dataset.ftype = "group";
    btn.dataset.fvalue = tag;
    btn.textContent = tag;
    btn.addEventListener("click",()=>{
      toggleGroup(tag);
      syncFilterButtons();
      render();
    });
    groupRow.appendChild(btn);
  });
}

/* カテゴリフィルター (Notionの「カテゴリ」プロパティから動的生成。データがなければ行ごと非表示) */
const categoryRow = document.getElementById("category-row");
if (CATEGORY_TAGS.length) {
  document.getElementById("category-label").style.display = "";
  CATEGORY_TAGS.forEach(cat=>{
    const btn = document.createElement("button");
    btn.className = "grp-btn filter-btn";
    btn.dataset.ftype = "category";
    btn.dataset.fvalue = cat;
    btn.textContent = cat;
    btn.addEventListener("click",()=>{
      toggleCategory(cat);
      syncFilterButtons();
      render();
    });
    categoryRow.appendChild(btn);
  });
}
syncFilterButtons();

/* 表示切替 (リスト / カレンダー) */
const viewRow = document.getElementById("view-row");
const VIEWS = [
  { id:"list",     label:"📋 リスト" },
  { id:"calendar", label:"📅 カレンダー" },
];
VIEWS.forEach(v=>{
  const btn = document.createElement("button");
  btn.className = "grp-btn view-btn" + (v.id===view?" on":"");
  btn.textContent = v.label;
  btn.addEventListener("click",()=>{
    view = v.id;
    document.querySelectorAll(".view-btn").forEach(b=>b.classList.toggle("on", b===btn));
    render();
  });
  viewRow.appendChild(btn);
});

render();
</script>
